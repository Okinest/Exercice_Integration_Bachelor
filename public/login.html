<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TalkNotes</title>
    <link rel="icon" type="image/png" href="./images/icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="min-h-screen bg-[#f7f7f9] text-[#111827]" style="font-family: Inter, sans-serif">
    <main class="flex min-h-screen items-center justify-center px-4">
      <section class="w-full max-w-[430px]">
        <div class="mb-7 flex items-center gap-2">
          <img src="../assets/images/icon.png" alt="TalkNotes icon" class="h-10 w-10 object-contain" />
          <span class="text-[24px] font-bold leading-none tracking-[-0.02em]">TalkNotes</span>
        </div>

        <h1 class="text-[28px] font-extrabold leading-[1.08] tracking-[-0.02em]">
          Login to your account
        </h1>
        <p class="mt-3 text-[15px] leading-6 text-[#9aa3af]">
          Enter your email to receive a one-time password (or use permanent password if you
          defined one).
        </p>

        <form class="mt-8">
          <label for="email" class="mb-2 block text-[15px] font-semibold text-[#111827]">
            Email address:
          </label>
          <input
            id="email"
            type="email"
            placeholder="your@email.com"
            class="h-12 w-full rounded-lg border border-[#e6e7eb] bg-white px-4 text-[15px] text-[#111827] outline-none transition placeholder:text-[#b3b8c3] focus:border-[#A78BFA] focus:ring-2 focus:ring-[#EDE9FE]"
          />

          <button
            type="button"
            class="mt-6 flex h-11 w-full items-center justify-center gap-2 rounded-lg bg-[#9b93f6] text-[15px] font-bold text-white transition hover:bg-[#8d84ef]"
          >
            <span class="inline-flex h-4 w-4 items-center justify-center leading-none">
              <i class="bi bi-envelope-fill text-[14px] leading-none" aria-hidden="true"></i>
            </span>
            Get one-time password
          </button>

          <button
            type="button"
            class="mt-3 flex h-11 w-full items-center justify-center gap-2 rounded-lg border-2 border-[#7367F0] bg-white text-[15px] font-bold text-[#5B4BE0] transition hover:bg-[#F7F5FF]"
          >
            <span class="inline-flex h-4 w-4 items-center justify-center leading-none">
              <i class="bi bi-fingerprint text-[14px] leading-none" aria-hidden="true"></i>
            </span>
            Login with password
          </button>
        </form>

        <p class="mt-5 text-center text-[14px] text-[#6B7280]">
          Problems logging in?
          <a href="#" class="font-semibold text-[#5B4BE0] hover:underline">Click here</a>
        </p>

        <div class="mt-10 flex items-center gap-4">
          <span class="h-px flex-1 bg-[#E5E7EB]"></span>
          <span class="text-[14px] text-[#9CA3AF]">Or continue with</span>
          <span class="h-px flex-1 bg-[#E5E7EB]"></span>
        </div>

        <div class="mt-6 grid grid-cols-2 gap-3">
          <button
            type="button"
            class="flex h-11 items-center justify-center gap-2 rounded-lg bg-[#f1f3f7] px-3 text-[14px] font-bold text-[#111827] transition hover:bg-[#e8ebf1]"
          >
            <svg
              class="h-[15px] w-[15px] shrink-0"
              viewBox="-3 0 262 262"
              xmlns="http://www.w3.org/2000/svg"
              preserveAspectRatio="xMidYMid"
              aria-hidden="true"
            >
              <path
                d="M255.878 133.451c0-10.734-.871-18.567-2.756-26.69H130.55v48.448h71.947c-1.45 12.04-9.283 30.172-26.69 42.356l-.244 1.622 38.755 30.023 2.685.268c24.659-22.774 38.875-56.282 38.875-96.027"
                fill="#4285F4"
              ></path>
              <path
                d="M130.55 261.1c35.248 0 64.839-11.605 86.453-31.622l-41.196-31.913c-11.024 7.688-25.82 13.055-45.257 13.055-34.523 0-63.824-22.773-74.269-54.25l-1.531.13-40.298 31.187-.527 1.465C35.393 231.798 79.49 261.1 130.55 261.1"
                fill="#34A853"
              ></path>
              <path
                d="M56.281 156.37c-2.756-8.123-4.351-16.827-4.351-25.82 0-8.994 1.595-17.697 4.206-25.82l-.073-1.73L15.26 71.312l-1.335.635C5.077 89.644 0 109.517 0 130.55s5.077 40.905 13.925 58.602l42.356-32.782"
                fill="#FBBC05"
              ></path>
              <path
                d="M130.55 50.479c24.514 0 41.05 10.589 50.479 19.438l36.844-35.974C195.245 12.91 165.798 0 130.55 0 79.49 0 35.393 29.301 13.925 71.947l42.211 32.783c10.59-31.477 39.891-54.251 74.414-54.251"
                fill="#EB4335"
              ></path>
            </svg>
            Continue with Google
          </button>

          <button
            type="button"
            class="flex h-11 items-center justify-center gap-2 rounded-lg bg-[#f1f3f7] px-3 text-[14px] font-bold text-[#111827] transition hover:bg-[#e8ebf1]"
          >
            <i class="bi bi-apple text-[15px]" aria-hidden="true"></i>
            Continue with Apple
          </button>
        </div>
      </section>
    </main>
  </body>
</html>
